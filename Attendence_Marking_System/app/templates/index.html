<!DOCTYPE html>
<html>
<head>
    <title>Attendance Table</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Face Recognition Attendance</h2>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Date</th>
            <th>Time</th>
        </tr>
    </thead>
    <tbody>
        {% for row in records %}
        <tr>
            <td>{{ row.name }}</td>
            <td>{{ row.date }}</td>
            <td>{{ row.time }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
